<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" role="img" aria-labelledby="title desc">
  <title id="title">Selected projects</title>
  <desc id="desc">Three selected projects: Korean Knowledge Assistant, PayFit ERP, and Seoul Labor Portal AI counseling chatbot.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="300" rx="28" fill="url(#bg)"/>
  <text x="64" y="60" class="sans" fill="#f8fafc" font-size="30" font-weight="760">Selected Work</text>
  <text x="64" y="90" class="mono" fill="#94a3b8" font-size="14">public proof where possible, careful boundary where private</text>

  <g transform="translate(64 126)">
    <rect width="352" height="120" rx="20" fill="#0b1120" stroke="#1e293b"/>
    <text x="24" y="38" class="sans" fill="#f8fafc" font-size="19" font-weight="760">Korean Knowledge Assistant</text>
    <text x="24" y="68" class="mono" fill="#94a3b8" font-size="13">hybrid RAG · evidence · streaming</text>
    <text x="24" y="96" class="mono" fill="#38bdf8" font-size="13">FastAPI / pgvector / React</text>
  </g>

  <g transform="translate(464 126)">
    <rect width="352" height="120" rx="20" fill="#0b1120" stroke="#1e293b"/>
    <text x="24" y="38" class="sans" fill="#f8fafc" font-size="19" font-weight="760">PayFit ERP</text>
    <text x="24" y="68" class="mono" fill="#94a3b8" font-size="13">payroll domain · rules · status flow</text>
    <text x="24" y="96" class="mono" fill="#818cf8" font-size="13">Kotlin / Spring Boot / PostgreSQL</text>
  </g>

  <g transform="translate(864 126)">
    <rect width="352" height="120" rx="20" fill="#0b1120" stroke="#1e293b"/>
    <text x="24" y="38" class="sans" fill="#f8fafc" font-size="19" font-weight="760">Seoul Labor Portal</text>
    <text x="24" y="68" class="mono" fill="#94a3b8" font-size="13">AI counseling · RAG · vLLM serving</text>
    <text x="24" y="96" class="mono" fill="#22c55e" font-size="13">private / production-oriented</text>
  </g>
</svg>
