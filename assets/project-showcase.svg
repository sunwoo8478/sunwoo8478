<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">대표 프로젝트 쇼케이스</title>
  <desc id="desc">이선우의 주요 개발 프로젝트를 제품 카드 형태로 정리한 이미지</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1000" height="520" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="952" height="472" rx="22" fill="none" stroke="#30363d"/>

  <g font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif">
    <text x="58" y="78" fill="#58a6ff" font-size="34" font-weight="850">Project Showcase</text>
    <text x="58" y="110" fill="#8b949e" font-size="16">AI 검색 시스템과 업무 도메인 백엔드를 중심으로 설계하고 구현합니다.</text>

    <g filter="url(#shadow)">
      <rect x="58" y="150" width="282" height="286" rx="22" fill="#0b1220" stroke="#253046"/>
      <rect x="82" y="174" width="72" height="10" rx="5" fill="url(#blue)"/>
      <text x="82" y="222" fill="#f0f6fc" font-size="24" font-weight="800">서울노동권익센터</text>
      <text x="82" y="252" fill="#f0f6fc" font-size="24" font-weight="800">AI 상담 챗봇</text>
      <text x="82" y="292" fill="#c9d1d9" font-size="15">Gemma 3 12B 기반 RAG</text>
      <text x="82" y="318" fill="#c9d1d9" font-size="15">A100 GPU 서버 부하 테스트</text>
      <text x="82" y="344" fill="#c9d1d9" font-size="15">스트리밍 SSE · 관리자 포털</text>
      <rect x="82" y="382" width="74" height="28" rx="14" fill="#10233d" stroke="#1f6feb"/>
      <text x="119" y="401" fill="#79c0ff" font-size="13" text-anchor="middle">vLLM</text>
      <rect x="166" y="382" width="74" height="28" rx="14" fill="#10233d" stroke="#1f6feb"/>
      <text x="203" y="401" fill="#79c0ff" font-size="13" text-anchor="middle">RAG</text>
      <rect x="250" y="382" width="58" height="28" rx="14" fill="#10233d" stroke="#1f6feb"/>
      <text x="279" y="401" fill="#79c0ff" font-size="13" text-anchor="middle">GPU</text>

      <rect x="359" y="150" width="282" height="286" rx="22" fill="#0b1220" stroke="#253046"/>
      <rect x="383" y="174" width="72" height="10" rx="5" fill="#6ee7b7"/>
      <text x="383" y="222" fill="#f0f6fc" font-size="24" font-weight="800">한국어 지식 기반</text>
      <text x="383" y="252" fill="#f0f6fc" font-size="24" font-weight="800">RAG 어시스턴트</text>
      <text x="383" y="292" fill="#c9d1d9" font-size="15">근거 기반 답변 생성</text>
      <text x="383" y="318" fill="#c9d1d9" font-size="15">FastAPI · PostgreSQL</text>
      <text x="383" y="344" fill="#c9d1d9" font-size="15">검색 품질 평가와 개선 루프</text>
      <rect x="383" y="382" width="74" height="28" rx="14" fill="#0f2a23" stroke="#2ea043"/>
      <text x="420" y="401" fill="#7ee787" font-size="13" text-anchor="middle">Python</text>
      <rect x="467" y="382" width="78" height="28" rx="14" fill="#0f2a23" stroke="#2ea043"/>
      <text x="506" y="401" fill="#7ee787" font-size="13" text-anchor="middle">FastAPI</text>
      <rect x="555" y="382" width="58" height="28" rx="14" fill="#0f2a23" stroke="#2ea043"/>
      <text x="584" y="401" fill="#7ee787" font-size="13" text-anchor="middle">React</text>

      <rect x="660" y="150" width="282" height="286" rx="22" fill="#0b1220" stroke="#253046"/>
      <rect x="684" y="174" width="72" height="10" rx="5" fill="#a371f7"/>
      <text x="684" y="222" fill="#f0f6fc" font-size="24" font-weight="800">PayFit ERP</text>
      <text x="684" y="252" fill="#f0f6fc" font-size="24" font-weight="800">급여·근태 시스템</text>
      <text x="684" y="292" fill="#c9d1d9" font-size="15">직원·근태·급여 도메인 설계</text>
      <text x="684" y="318" fill="#c9d1d9" font-size="15">법정 공제와 명세서 자동화</text>
      <text x="684" y="344" fill="#c9d1d9" font-size="15">Kotlin · Spring Boot 기반</text>
      <rect x="684" y="382" width="72" height="28" rx="14" fill="#211638" stroke="#8957e5"/>
      <text x="720" y="401" fill="#d2a8ff" font-size="13" text-anchor="middle">Kotlin</text>
      <rect x="766" y="382" width="82" height="28" rx="14" fill="#211638" stroke="#8957e5"/>
      <text x="807" y="401" fill="#d2a8ff" font-size="13" text-anchor="middle">Spring</text>
      <rect x="858" y="382" width="54" height="28" rx="14" fill="#211638" stroke="#8957e5"/>
      <text x="885" y="401" fill="#d2a8ff" font-size="13" text-anchor="middle">SQL</text>
    </g>
  </g>
</svg>
