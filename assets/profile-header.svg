<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">이선우 개발자 프로필 히어로</title>
  <desc id="desc">백엔드와 AI 검색 시스템을 만드는 개발자 이선우의 커맨드 센터형 프로필 배너</desc>

  <defs>
    <radialGradient id="glowBlue" cx="20%" cy="10%" r="80%">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.8"/>
      <stop offset="0.42" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMint" cx="84%" cy="16%" r="70%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.65"/>
      <stop offset="0.48" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="72%" cy="84%" r="70%">
      <stop offset="0" stop-color="#8957e5" stop-opacity="0.6"/>
      <stop offset="0.48" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1628" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#070d18" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#8b949e" stroke-opacity="0.09"/>
    </pattern>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .sans{font-family:Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 4.1s ease-in-out infinite}
      .dash{stroke-dasharray:10 14;animation:dash 12s linear infinite}
      .blink{animation:blink 1.15s steps(2,end) infinite}
      .float{animation:float 5s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
      @keyframes dash{to{stroke-dashoffset:-240}}
      @keyframes blink{0%,45%{opacity:1}46%,100%{opacity:.08}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    </style>
  </defs>

  <rect width="1280" height="640" rx="34" fill="#0d1117"/>
  <rect width="1280" height="640" rx="34" fill="url(#glowBlue)"/>
  <rect width="1280" height="640" rx="34" fill="url(#glowMint)"/>
  <rect width="1280" height="640" rx="34" fill="url(#glowViolet)"/>
  <rect width="1280" height="640" rx="34" fill="url(#grid)"/>
  <rect x="22" y="22" width="1236" height="596" rx="26" fill="none" stroke="#30363d"/>

  <g opacity="0.5">
    <path class="dash" d="M92 520C210 400 325 500 448 360S706 230 850 314 1055 452 1190 260" fill="none" stroke="url(#line)" stroke-width="2"/>
    <path class="dash" d="M94 154C226 252 354 208 484 288S720 434 868 286 1046 136 1192 190" fill="none" stroke="#58a6ff" stroke-width="1.4" opacity="0.55"/>
  </g>

  <g class="sans">
    <text x="76" y="104" fill="#8b949e" font-size="16" font-weight="700" letter-spacing="4">SUNWOO8478 / DEVELOPER COMMAND CENTER</text>
    <text x="74" y="178" fill="#f0f6fc" font-size="66" font-weight="900" letter-spacing="-2">이선우</text>
    <text x="76" y="232" fill="#c9d1d9" font-size="30" font-weight="650">백엔드와 AI 검색 시스템을 제품처럼 설계합니다.</text>
    <text x="78" y="276" fill="#79c0ff" font-size="18" class="mono">RAG Pipeline · LLM Serving · Spring Boot · FastAPI · GPU Ops</text>

    <g transform="translate(78 324)">
      <rect width="142" height="42" rx="21" fill="#10233d" stroke="#1f6feb"/>
      <text x="71" y="27" fill="#79c0ff" font-size="14" font-weight="800" text-anchor="middle">Backend</text>
      <rect x="158" width="142" height="42" rx="21" fill="#0f2a23" stroke="#2ea043"/>
      <text x="229" y="27" fill="#7ee787" font-size="14" font-weight="800" text-anchor="middle">AI Search</text>
      <rect x="316" width="142" height="42" rx="21" fill="#211638" stroke="#8957e5"/>
      <text x="387" y="27" fill="#d2a8ff" font-size="14" font-weight="800" text-anchor="middle">GPU Serving</text>
      <rect x="474" width="142" height="42" rx="21" fill="#2b1b08" stroke="#d29922"/>
      <text x="545" y="27" fill="#f2cc60" font-size="14" font-weight="800" text-anchor="middle">Operations</text>
    </g>
  </g>

  <g transform="translate(76 430)" filter="url(#shadow)">
    <rect width="520" height="126" rx="18" fill="#020617" fill-opacity="0.76" stroke="#253046"/>
    <circle cx="28" cy="27" r="6" fill="#ff7b72"/>
    <circle cx="50" cy="27" r="6" fill="#d29922"/>
    <circle cx="72" cy="27" r="6" fill="#3fb950"/>
    <text x="28" y="65" class="mono" fill="#8b949e" font-size="15">$ build profile --mode production</text>
    <text x="28" y="94" class="mono" fill="#7ee787" font-size="15">ready: search_quality, latency, deployment</text>
    <rect class="blink" x="430" y="82" width="10" height="22" fill="#58a6ff"/>
  </g>

  <g transform="translate(706 112)" filter="url(#shadow)">
    <rect width="466" height="390" rx="24" fill="url(#panel)" stroke="#30363d"/>
    <text x="34" y="54" class="mono" fill="#58a6ff" font-size="17" font-weight="800">live.system.map</text>
    <text x="332" y="54" class="mono" fill="#3fb950" font-size="13">ONLINE</text>
    <circle class="pulse" cx="384" cy="49" r="6" fill="#3fb950"/>

    <g transform="translate(233 204)">
      <circle r="118" fill="#0b1220" stroke="#1f6feb" stroke-opacity="0.45"/>
      <circle r="82" fill="none" stroke="#58a6ff" stroke-opacity="0.32"/>
      <circle r="45" fill="none" stroke="#2dd4bf" stroke-opacity="0.45"/>
      <path class="dash" d="M0-118A118 118 0 0 1 102 59" fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
      <line x1="-118" y1="0" x2="118" y2="0" stroke="#30363d"/>
      <line x1="0" y1="-118" x2="0" y2="118" stroke="#30363d"/>
      <circle class="pulse" cx="-70" cy="-42" r="9" fill="#58a6ff"/>
      <circle class="pulse2" cx="58" cy="-68" r="9" fill="#2dd4bf"/>
      <circle class="pulse" cx="76" cy="62" r="9" fill="#a371f7"/>
      <circle class="pulse2" cx="-48" cy="76" r="9" fill="#d29922"/>
      <circle r="18" fill="#f0f6fc"/>
      <circle r="9" fill="#0d1117"/>
    </g>

    <g class="mono" font-size="13">
      <text x="34" y="326" fill="#8b949e">pipeline</text>
      <text x="104" y="326" fill="#c9d1d9">query → retrieve → rerank → stream</text>
      <text x="34" y="354" fill="#8b949e">latency</text>
      <text x="104" y="354" fill="#c9d1d9">TTFT measured, not guessed</text>
    </g>
  </g>

  <g class="float">
    <circle cx="1138" cy="96" r="8" fill="#58a6ff" filter="url(#blur)"/>
    <circle cx="1108" cy="544" r="10" fill="#2dd4bf" filter="url(#blur)"/>
    <circle cx="636" cy="112" r="7" fill="#a371f7" filter="url(#blur)"/>
  </g>
</svg>
