<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">RAG 아키텍처 흐름</title>
  <desc id="desc">사용자 질문에서 API, 벡터 검색, 리랭킹, LLM, 스트리밍 답변까지 이어지는 흐름</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <text x="64" y="58" fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="30" font-weight="760">RAG Architecture</text>
  <text x="64" y="88" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="15">질문 처리, 검색, 생성, 스트리밍, 관측까지 하나의 흐름으로 관리합니다.</text>

  <g transform="translate(64 128)" filter="url(#shadow)" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif">
    <g>
      <rect width="134" height="76" rx="18" fill="#111827" stroke="#2563eb"/>
      <text x="36" y="34" fill="#dbeafe" font-size="17" font-weight="750">Client</text>
      <text x="25" y="58" fill="#93c5fd" font-size="13">질문 입력</text>
    </g>

    <g transform="translate(172 0)">
      <rect width="134" height="76" rx="18" fill="#111827" stroke="#0d9488"/>
      <text x="40" y="34" fill="#ccfbf1" font-size="17" font-weight="750">API</text>
      <text x="24" y="58" fill="#5eead4" font-size="13">인증 · 라우팅</text>
    </g>

    <g transform="translate(344 0)">
      <rect width="134" height="76" rx="18" fill="#111827" stroke="#64748b"/>
      <text x="28" y="34" fill="#e2e8f0" font-size="17" font-weight="750">Normalize</text>
      <text x="25" y="58" fill="#cbd5e1" font-size="13">질문 정규화</text>
    </g>

    <g transform="translate(516 0)">
      <rect width="134" height="76" rx="18" fill="#111827" stroke="#f59e0b"/>
      <text x="23" y="34" fill="#fef3c7" font-size="17" font-weight="750">Vector DB</text>
      <text x="26" y="58" fill="#fde68a" font-size="13">문서 검색</text>
    </g>

    <g transform="translate(688 0)">
      <rect width="134" height="76" rx="18" fill="#111827" stroke="#22c55e"/>
      <text x="34" y="34" fill="#dcfce7" font-size="17" font-weight="750">Rerank</text>
      <text x="25" y="58" fill="#86efac" font-size="13">근거 재정렬</text>
    </g>

    <g transform="translate(860 0)">
      <rect width="134" height="76" rx="18" fill="#111827" stroke="#7c3aed"/>
      <text x="24" y="34" fill="#ede9fe" font-size="17" font-weight="750">Prompt</text>
      <text x="25" y="58" fill="#c4b5fd" font-size="13">컨텍스트 구성</text>
    </g>

    <g transform="translate(1032 0)">
      <rect width="134" height="76" rx="18" fill="#111827" stroke="#38bdf8"/>
      <text x="48" y="34" fill="#e0f2fe" font-size="17" font-weight="750">LLM</text>
      <text x="27" y="58" fill="#7dd3fc" font-size="13">답변 생성</text>
    </g>

    <path d="M142 38 H164" stroke="url(#arrow)" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M314 38 H336" stroke="url(#arrow)" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M486 38 H508" stroke="url(#arrow)" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M658 38 H680" stroke="url(#arrow)" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M830 38 H852" stroke="url(#arrow)" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M1002 38 H1024" stroke="url(#arrow)" stroke-width="3" marker-end="url(#arrowHead)"/>
  </g>

  <g transform="translate(64 244)" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif">
    <rect width="1152" height="62" rx="18" fill="#0b1120" stroke="#1e293b"/>
    <text x="28" y="38" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">observability</text>
    <text x="158" y="38" fill="#cbd5e1" font-size="15">TTFT · token throughput · retrieval hit rate · error logs · load test result · fallback path</text>
  </g>
</svg>
