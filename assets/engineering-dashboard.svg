<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">이선우 엔지니어링 대시보드</title>
  <desc id="desc">백엔드, RAG, 운영 관점의 개발 역량을 터미널과 시스템 카드 형태로 정리한 섹션</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#94a3b8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="560" rx="26" fill="url(#bg)"/>
  <rect width="1280" height="560" rx="26" fill="url(#grid)"/>
  <circle cx="1096" cy="112" r="230" fill="#0ea5e9" opacity="0.12"/>
  <circle cx="156" cy="492" r="230" fill="#14b8a6" opacity="0.10"/>

  <g transform="translate(60 48)">
    <text fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="32" font-weight="760" letter-spacing="-0.4">
      Engineering Snapshot
    </text>
    <text y="36" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="16">
      설계, 구현, 배포, 관측까지 이어지는 백엔드 중심 개발
    </text>
  </g>

  <g transform="translate(60 116)" filter="url(#shadow)">
    <rect width="560" height="352" rx="18" fill="#020617" stroke="#1f3b57"/>
    <rect width="560" height="42" rx="18" fill="#0f172a"/>
    <circle cx="26" cy="21" r="6" fill="#fb7185"/>
    <circle cx="48" cy="21" r="6" fill="#fbbf24"/>
    <circle cx="70" cy="21" r="6" fill="#34d399"/>
    <text x="100" y="27" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">~/sunwoo8478/profile</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
      <text x="28" y="82" fill="#22d3ee">$ whoami</text>
      <text x="28" y="110" fill="#e2e8f0">backend_ai_engineer</text>

      <text x="28" y="152" fill="#22d3ee">$ cat focus.txt</text>
      <text x="28" y="180" fill="#e2e8f0">RAG pipelines, API design, LLM serving</text>
      <text x="28" y="206" fill="#e2e8f0">performance testing, observability, CI/CD</text>

      <text x="28" y="248" fill="#22d3ee">$ grep -r "production" ./work</text>
      <text x="28" y="276" fill="#a7f3d0">TTFT 1.7s / A100 80GB / streaming SSE</text>
      <text x="28" y="302" fill="#cbd5e1">semantic cache / reranker / handoff flow</text>

      <rect x="28" y="324" width="12" height="18" rx="2" fill="url(#cyan)">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g transform="translate(660 116)" filter="url(#shadow)">
    <rect width="560" height="352" rx="18" fill="#0b1120" stroke="#1f3b57"/>

    <text x="28" y="44" fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="740">System Flow</text>
    <text x="28" y="72" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="14">질문에서 답변까지의 흐름을 운영 관점으로 관리합니다.</text>

    <g font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="650">
      <rect x="32" y="112" width="130" height="54" rx="14" fill="#111827" stroke="#2563eb"/>
      <text x="58" y="145" fill="#dbeafe">Client</text>

      <rect x="216" y="112" width="130" height="54" rx="14" fill="#111827" stroke="#0d9488"/>
      <text x="246" y="145" fill="#ccfbf1">API</text>

      <rect x="400" y="112" width="130" height="54" rx="14" fill="#111827" stroke="#7c3aed"/>
      <text x="426" y="145" fill="#ede9fe">LLM</text>

      <path d="M162 139 H216" stroke="url(#cyan)" stroke-width="3" stroke-linecap="round"/>
      <path d="M346 139 H400" stroke="url(#cyan)" stroke-width="3" stroke-linecap="round"/>

      <rect x="32" y="216" width="130" height="54" rx="14" fill="#111827" stroke="#f59e0b"/>
      <text x="54" y="249" fill="#fef3c7">Vector DB</text>

      <rect x="216" y="216" width="130" height="54" rx="14" fill="#111827" stroke="#22c55e"/>
      <text x="247" y="249" fill="#dcfce7">Rerank</text>

      <rect x="400" y="216" width="130" height="54" rx="14" fill="#111827" stroke="#38bdf8"/>
      <text x="433" y="249" fill="#e0f2fe">SSE</text>

      <path d="M281 166 V216" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
      <path d="M162 243 H216" stroke="url(#purple)" stroke-width="3" stroke-linecap="round"/>
      <path d="M346 243 H400" stroke="url(#purple)" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g transform="translate(32 308)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
      <text fill="#38bdf8">checks:</text>
      <text x="62" fill="#94a3b8">latency · retrieval quality · logs · load test · fallback</text>
    </g>
  </g>

  <g transform="translate(60 500)" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="15">
    <rect width="1160" height="1.5" fill="url(#cyan)" opacity="0.9"/>
    <text y="34" fill="#cbd5e1">Build small, measure early, ship reliably.</text>
  </g>
</svg>
