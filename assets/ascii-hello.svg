<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">3D ASCII Hello Terminal</title>
  <desc id="desc">HELLO л¬ёмһҗлҘј мһ…мІҙ л„ӨмҳЁ м•„мҠӨнӮӨ мҠӨнғҖмқјлЎң н‘ңнҳ„н•ң н„°лҜёл„җ м№ҙл“ң</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b3f5ff"/>
      <stop offset="0.45" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a7f3d0"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0abfc"/>
      <stop offset="1" stop-color="#8957e5"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.52" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#d2a8ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#8b949e" stroke-opacity="0.08"/>
    </pattern>
    <filter id="softGlow" x="-30%" y="-45%" width="160%" height="190%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.24 0 0 0 0 0.70 0 0 0 0 1 0 0 0 0.75 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .scan{animation:scan 4.5s linear infinite}
      .blink{animation:blink 1.15s steps(2,end) infinite}
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      @keyframes scan{0%{transform:translateY(-80px);opacity:0}15%{opacity:.55}70%{opacity:.55}100%{transform:translateY(310px);opacity:0}}
      @keyframes blink{0%,45%{opacity:1}46%,100%{opacity:.08}}
      @keyframes pulse{0%,100%{opacity:.48}50%{opacity:1}}
    </style>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="30" fill="url(#glow)"/>
  <rect width="1200" height="360" rx="30" fill="url(#grid)"/>
  <rect x="22" y="22" width="1156" height="316" rx="24" fill="none" stroke="#30363d"/>

  <g filter="url(#shadow)">
    <rect x="46" y="46" width="1108" height="268" rx="22" fill="#020617" fill-opacity="0.68" stroke="#253046"/>
    <rect x="46" y="46" width="1108" height="46" rx="22" fill="#0b1220" fill-opacity="0.88"/>
    <circle cx="76" cy="69" r="6" fill="#ff7b72"/>
    <circle cx="98" cy="69" r="6" fill="#d29922"/>
    <circle cx="120" cy="69" r="6" fill="#3fb950"/>
    <text x="150" y="75" class="mono" fill="#8b949e" font-size="14">sunwoo8478@portfolio:~/hello-3d</text>
    <rect x="46" y="92" width="1108" height="3" fill="url(#bar)" opacity="0.85"/>
  </g>

