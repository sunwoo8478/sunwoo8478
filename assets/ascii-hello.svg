        <text x="61" y="209">| |__| | |__  | |    | |   | |  | |</text>
        <text x="61" y="243">|  __  |  __| | |    | |   | |  | |</text>
        <text x="61" y="277">| |  | | |____| |____| |___| |__| |</text>
        <text x="61" y="311">|_|  |_|______|______|______\____/ </text>
      </g>
      <g fill="#f2f2f2">
        <text x="56" y="136"> _    _ ______ _      _      ____  </text>
        <text x="56" y="170">| |  | |  ____| |    | |    / __ \ </text>
        <text x="56" y="204">| |__| | |__  | |    | |   | |  | |</text>
        <text x="56" y="238">|  __  |  __| | |    | |   | |  | |</text>
        <text x="56" y="272">| |  | | |____| |____| |___| |__| |</text>
        <text x="56" y="306">|_|  |_|______|______|______\____/ </text>
