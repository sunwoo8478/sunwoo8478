    <text x="770" y="140" font-size="15" fill="#bdbdbd">$ ./stack</text>
    <text x="770" y="174" font-size="15" fill="#f5f5f5">backend</text>
    <text x="850" y="174" font-size="15" fill="#bdbdbd">spring boot</text>
