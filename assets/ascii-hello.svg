      <text x="0" y="236">в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ </text>
    </g>
  </g>

  <g class="mono" font-size="14">
    <rect x="840" y="122" width="270" height="152" rx="18" fill="#0b1220" fill-opacity="0.78" stroke="#30363d"/>
    <text x="864" y="156" fill="#8b949e">$ ./hello --stack</text>
    <text x="864" y="188" fill="#7ee787">backend: Spring Boot</text>
    <text x="864" y="220" fill="#79c0ff">search: RAG pipeline</text>
    <text x="864" y="252" fill="#d2a8ff">ops: GPU serving</text>
    <rect class="blink" x="1064" y="238" width="9" height="20" fill="#58a6ff"/>
  </g>

  <rect class="scan" x="48" y="96" width="1104" height="38" fill="url(#bar)" opacity="0.18"/>
  <circle class="pulse" cx="1112" cy="68" r="5" fill="#2dd4bf"/>
</svg>
