<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Clean ASCII Hello</title>
  <desc id="desc">검은 터미널 화면에 흰색 ASCII HELLO를 표시한 이미지</desc>

  <rect width="1100" height="360" rx="18" fill="#000000"/>
  <rect x="18" y="18" width="1064" height="324" rx="14" fill="none" stroke="#222222"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#f5f5f5">
    <text x="52" y="58" font-size="15">$ whoami</text>
    <text x="52" y="88" font-size="15" fill="#c9c9c9">sunwoo8478</text>

    <text x="52" y="142" font-size="25" font-weight="700" xml:space="preserve"> _   _ _____ _     _     ___  </text>
    <text x="52" y="174" font-size="25" font-weight="700" xml:space="preserve">| | | | ____| |   | |   / _ \ </text>
    <text x="52" y="206" font-size="25" font-weight="700" xml:space="preserve">| |_| |  _| | |   | |  | | | |</text>
    <text x="52" y="238" font-size="25" font-weight="700" xml:space="preserve">|  _  | |___| |___| |__| |_| |</text>
    <text x="52" y="270" font-size="25" font-weight="700" xml:space="preserve">|_| |_|_____|_____|_____\___/ </text>

    <text x="52" y="318" font-size="15" fill="#c9c9c9">backend · rag · llm serving · systems</text>
    <rect x="410" y="303" width="9" height="19" fill="#f5f5f5">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
