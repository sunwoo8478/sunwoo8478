<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">기술 스택 매트릭스</title>
  <desc id="desc">백엔드, AI 검색, 데이터, 인프라 기술 스택을 정리한 이미지</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <style>
      .title{font:800 32px Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif;fill:#58a6ff}
      .sub{font:500 15px Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif;fill:#8b949e}
      .head{font:800 20px Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif;fill:#f0f6fc}
      .item{font:650 15px Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif;fill:#c9d1d9}
    </style>
  </defs>

  <rect width="1000" height="430" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="952" height="382" rx="22" fill="none" stroke="#30363d"/>

  <text x="58" y="78" class="title">Stack Matrix</text>
  <text x="58" y="108" class="sub">실제 프로젝트에서 자주 맞닿는 레이어 기준으로 정리했습니다.</text>

  <g transform="translate(58 145)">
    <rect width="205" height="205" rx="20" fill="#0b1220" stroke="#253046"/>
    <circle cx="34" cy="38" r="11" fill="#58a6ff"/>
    <text x="58" y="45" class="head">Backend</text>
    <text x="30" y="88" class="item">Java · Kotlin</text>
    <text x="30" y="120" class="item">Spring Boot</text>
    <text x="30" y="152" class="item">Spring Security</text>
    <text x="30" y="184" class="item">REST API</text>
  </g>

  <g transform="translate(285 145)">
    <rect width="205" height="205" rx="20" fill="#0b1220" stroke="#253046"/>
    <circle cx="34" cy="38" r="11" fill="#7ee787"/>
    <text x="58" y="45" class="head">AI Search</text>
    <text x="30" y="88" class="item">RAG Pipeline</text>
    <text x="30" y="120" class="item">vLLM · Ollama</text>
    <text x="30" y="152" class="item">bge-m3</text>
    <text x="30" y="184" class="item">BGE-Reranker</text>
  </g>

  <g transform="translate(512 145)">
    <rect width="205" height="205" rx="20" fill="#0b1220" stroke="#253046"/>
    <circle cx="34" cy="38" r="11" fill="#d29922"/>
    <text x="58" y="45" class="head">Data</text>
    <text x="30" y="88" class="item">MariaDB</text>
    <text x="30" y="120" class="item">PostgreSQL</text>
    <text x="30" y="152" class="item">pgvector</text>
    <text x="30" y="184" class="item">Redis · InfluxDB</text>
  </g>

  <g transform="translate(739 145)">
    <rect width="205" height="205" rx="20" fill="#0b1220" stroke="#253046"/>
    <circle cx="34" cy="38" r="11" fill="#a371f7"/>
    <text x="58" y="45" class="head">Ops</text>
    <text x="30" y="88" class="item">Docker</text>
    <text x="30" y="120" class="item">GitHub Actions</text>
    <text x="30" y="152" class="item">Linux · KT Cloud</text>
    <text x="30" y="184" class="item">Grafana</text>
  </g>
</svg>
