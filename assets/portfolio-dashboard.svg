<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Portfolio Operating System</title>
  <desc id="desc">이선우의 개발 역량, 프로젝트, 기술 스택, 운영 관점을 하나의 고급 대시보드로 표현한 이미지</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.46" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#08111f"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="18%" cy="12%" r="60%">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="86%" cy="10%" r="64%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="0.44" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleGlow" cx="68%" cy="86%" r="70%">
      <stop offset="0" stop-color="#8957e5" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#d2a8ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#070d18" stop-opacity="0.96"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#8b949e" stroke-opacity="0.08"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .sans{font-family:Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .h1{font:900 42px Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif;fill:#f0f6fc;letter-spacing:-1px}
      .h2{font:850 22px Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif;fill:#f0f6fc}
      .muted{fill:#8b949e}
      .body{font:600 15px Pretendard,Noto Sans KR,Apple SD Gothic Neo,Segoe UI,sans-serif;fill:#c9d1d9}
      .tiny{font:700 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#8b949e}
      .dash{stroke-dasharray:10 14;animation:dash 10s linear infinite}
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 4.2s ease-in-out infinite}
      @keyframes dash{to{stroke-dashoffset:-240}}
      @keyframes pulse{0%,100%{opacity:.42}50%{opacity:1}}
    </style>
  </defs>

  <rect width="1280" height="900" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="900" rx="34" fill="url(#blueGlow)"/>
  <rect width="1280" height="900" rx="34" fill="url(#greenGlow)"/>
  <rect width="1280" height="900" rx="34" fill="url(#purpleGlow)"/>
  <rect width="1280" height="900" rx="34" fill="url(#grid)"/>
  <rect x="24" y="24" width="1232" height="852" rx="28" fill="none" stroke="#30363d"/>

  <g transform="translate(62 54)">
    <text class="tiny" x="0" y="0">SUNWOO8478 / PORTFOLIO OPERATING SYSTEM</text>
    <text class="h1" x="0" y="56">AI 검색 제품을 만드는 백엔드 엔지니어</text>
    <text class="body" x="0" y="92">도메인 문제를 구조화하고, RAG 파이프라인과 운영 지표까지 연결합니다.</text>
    <rect x="940" y="-18" width="176" height="38" rx="19" fill="#0f2a23" stroke="#2ea043"/>
    <circle class="pulse" cx="964" cy="1" r="6" fill="#3fb950"/>
    <text class="mono" x="982" y="7" fill="#7ee787" font-size="13" font-weight="800">available to build</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="62" y="190" width="350" height="250" rx="24" fill="url(#panel)" stroke="#253046"/>
    <text class="h2" x="92" y="232">Current Mission</text>
    <text class="body" x="92" y="272">서울노동권익센터 AI 상담 챗봇</text>
    <text class="body" x="92" y="304">Gemma 3 12B · RAG · A100 GPU</text>
    <text class="body" x="92" y="336">스트리밍 응답과 상담 연계 흐름 설계</text>
    <rect x="92" y="374" width="96" height="34" rx="17" fill="#10233d" stroke="#1f6feb"/>
    <text class="sans" x="140" y="397" fill="#79c0ff" font-size="13" font-weight="800" text-anchor="middle">TTFT 1.7s</text>
    <rect x="200" y="374" width="96" height="34" rx="17" fill="#0f2a23" stroke="#2ea043"/>
    <text class="sans" x="248" y="397" fill="#7ee787" font-size="13" font-weight="800" text-anchor="middle">A100 80GB</text>
    <rect x="308" y="374" width="68" height="34" rx="17" fill="#211638" stroke="#8957e5"/>
    <text class="sans" x="342" y="397" fill="#d2a8ff" font-size="13" font-weight="800" text-anchor="middle">RAG</text>

    <rect x="444" y="190" width="368" height="250" rx="24" fill="url(#panel)" stroke="#253046"/>
    <text class="h2" x="474" y="232">Engineering Loop</text>
    <path class="dash" d="M525 330C552 250 704 250 731 330S552 410 525 330Z" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <circle class="pulse" cx="525" cy="330" r="13" fill="#58a6ff"/>
    <circle class="pulse2" cx="628" cy="268" r="13" fill="#2dd4bf"/>
    <circle class="pulse" cx="731" cy="330" r="13" fill="#a371f7"/>
    <circle class="pulse2" cx="628" cy="392" r="13" fill="#d29922"/>
    <text class="tiny" x="494" y="382">problem</text>
    <text class="tiny" x="596" y="246">design</text>
    <text class="tiny" x="720" y="382">build</text>
    <text class="tiny" x="590" y="428">measure</text>
    <text class="body" x="474" y="408">작게 만들고, 숫자로 보고, 운영 가능한 형태로 마무리합니다.</text>

    <rect x="844" y="190" width="374" height="250" rx="24" fill="url(#panel)" stroke="#253046"/>
    <text class="h2" x="874" y="232">Runtime Stack</text>
    <g class="mono" font-size="14">
      <text x="874" y="278" fill="#79c0ff">backend</text>
      <text x="962" y="278" fill="#c9d1d9">Java · Kotlin · Spring Boot</text>
      <text x="874" y="316" fill="#7ee787">ai/search</text>
      <text x="962" y="316" fill="#c9d1d9">RAG · vLLM · bge-m3</text>
      <text x="874" y="354" fill="#d2a8ff">data</text>
      <text x="962" y="354" fill="#c9d1d9">MariaDB · PostgreSQL · Redis</text>
      <text x="874" y="392" fill="#f2cc60">ops</text>
      <text x="962" y="392" fill="#c9d1d9">Docker · Actions · Grafana</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="62" y="474" width="756" height="324" rx="24" fill="url(#panel)" stroke="#253046"/>
    <text class="h2" x="92" y="518">Featured Systems</text>

    <g transform="translate(92 552)">
      <rect width="208" height="190" rx="20" fill="#0b1220" stroke="#30363d"/>
      <rect x="22" y="24" width="54" height="8" rx="4" fill="#58a6ff"/>
      <text class="sans" x="22" y="62" fill="#f0f6fc" font-size="20" font-weight="850">AI 상담 챗봇</text>
      <text class="body" x="22" y="96">노무상담 RAG</text>
      <text class="body" x="22" y="124">SSE 스트리밍</text>
      <text class="body" x="22" y="152">GPU 서버 운영</text>
    </g>

    <g transform="translate(324 552)">
      <rect width="208" height="190" rx="20" fill="#0b1220" stroke="#30363d"/>
      <rect x="22" y="24" width="54" height="8" rx="4" fill="#2dd4bf"/>
      <text class="sans" x="22" y="62" fill="#f0f6fc" font-size="20" font-weight="850">Korean RAG</text>
      <text class="body" x="22" y="96">근거 기반 답변</text>
      <text class="body" x="22" y="124">FastAPI</text>
      <text class="body" x="22" y="152">pgvector 검색</text>
    </g>

    <g transform="translate(556 552)">
      <rect width="208" height="190" rx="20" fill="#0b1220" stroke="#30363d"/>
      <rect x="22" y="24" width="54" height="8" rx="4" fill="#a371f7"/>
      <text class="sans" x="22" y="62" fill="#f0f6fc" font-size="20" font-weight="850">PayFit ERP</text>
      <text class="body" x="22" y="96">급여 도메인</text>
      <text class="body" x="22" y="124">근태·공제</text>
      <text class="body" x="22" y="152">Kotlin Backend</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="474" width="368" height="324" rx="24" fill="#020617" fill-opacity="0.84" stroke="#253046"/>
    <circle cx="882" cy="506" r="6" fill="#ff7b72"/>
    <circle cx="904" cy="506" r="6" fill="#d29922"/>
    <circle cx="926" cy="506" r="6" fill="#3fb950"/>
    <text class="mono" x="882" y="552" fill="#8b949e" font-size="14">$ deploy --target production</text>
    <text class="mono" x="882" y="588" fill="#79c0ff" font-size="14">collecting metrics...</text>
    <text class="mono" x="882" y="624" fill="#7ee787" font-size="14">search_quality: tracked</text>
    <text class="mono" x="882" y="660" fill="#7ee787" font-size="14">latency_budget: visible</text>
    <text class="mono" x="882" y="696" fill="#d2a8ff" font-size="14">handoff_flow: designed</text>
    <rect x="882" y="732" width="264" height="12" rx="6" fill="#21262d"/>
    <rect x="882" y="732" width="216" height="12" rx="6" fill="url(#accent)"/>
    <text class="tiny" x="882" y="770">production readiness 82%</text>
  </g>
</svg>
