<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">이선우 개발자 역량 요약</title>
  <desc id="desc">RAG 시스템, 백엔드, 인프라 운영 역량을 정리한 카드형 프로필 섹션</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.54" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#102033"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#94a3b8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="24" fill="url(#grid)"/>
  <circle cx="1110" cy="52" r="180" fill="#2563eb" opacity="0.16"/>
  <circle cx="114" cy="374" r="190" fill="#14b8a6" opacity="0.12"/>

  <text x="72" y="72" fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="34" font-weight="750" letter-spacing="-0.6">
    실서비스를 끝까지 가져가는 백엔드 · AI 개발자
  </text>
  <text x="72" y="112" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="500">
    검색 품질, 응답 속도, 운영 안정성을 함께 보는 개발을 지향합니다.
  </text>
  <rect x="72" y="138" width="1136" height="3" rx="1.5" fill="url(#line)"/>

  <g transform="translate(72 174)" filter="url(#shadow)">
    <rect width="352" height="178" rx="20" fill="url(#card)" stroke="#1e3a5f"/>
    <rect x="24" y="24" width="54" height="54" rx="16" fill="#0f766e" opacity="0.22"/>
    <text x="40" y="59" fill="#5eead4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="800">AI</text>
    <text x="24" y="108" fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="23" font-weight="750">RAG · LLM Serving</text>
    <text x="24" y="139" fill="#cbd5e1" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="16">bge-m3, BGE-Reranker, vLLM</text>
    <text x="24" y="164" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="15">근거 기반 답변과 응답 속도 최적화</text>
  </g>

  <g transform="translate(464 174)" filter="url(#shadow)">
    <rect width="352" height="178" rx="20" fill="url(#card)" stroke="#1e3a5f"/>
    <rect x="24" y="24" width="54" height="54" rx="16" fill="#1d4ed8" opacity="0.22"/>
    <text x="38" y="59" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="800">BE</text>
    <text x="24" y="108" fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="23" font-weight="750">Backend Engineering</text>
    <text x="24" y="139" fill="#cbd5e1" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="16">Spring Boot, FastAPI, 인증·인가</text>
    <text x="24" y="164" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="15">도메인 모델링과 API 설계 중심</text>
  </g>

  <g transform="translate(856 174)" filter="url(#shadow)">
    <rect width="352" height="178" rx="20" fill="url(#card)" stroke="#1e3a5f"/>
    <rect x="24" y="24" width="54" height="54" rx="16" fill="#7c3aed" opacity="0.22"/>
    <text x="37" y="59" fill="#c4b5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="800">OP</text>
    <text x="24" y="108" fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="23" font-weight="750">Infra · Observability</text>
    <text x="24" y="139" fill="#cbd5e1" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="16">Docker, CI/CD, Grafana, GPU Server</text>
    <text x="24" y="164" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="15">배포 이후의 성능과 운영까지 확인</text>
  </g>

  <g transform="translate(72 374)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
    <text fill="#38bdf8">focus</text>
    <text x="54" fill="#94a3b8">= reliable backend systems + retrieval quality + production operation</text>
  </g>
</svg>
