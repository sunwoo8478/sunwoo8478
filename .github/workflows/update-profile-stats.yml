name: Update GitHub Stats Card

on:
  schedule:
    - cron: "10 15 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update_github_stats.py"
      - ".github/workflows/update-profile-stats.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate stats SVG
        env:
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_STATS_USERNAME: sunwoo8478
        run: python scripts/update_github_stats.py

      - name: Commit updated SVG
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: GitHub 통계 카드 자동 갱신"
          file_pattern: assets/github-stats-card.svg
